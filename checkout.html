<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Jomidar 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/cart.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
  <div class="offline-banner" id="offlineBanner">⚠️ You are offline</div>
  <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <nav id="navbar"></nav>
  <main>
    <h1 class="cart-page-title">Checkout</h1>
    <div class="checkout-layout">
      <div class="checkout-form-col">
        <!-- Shipping Info -->
        <div class="checkout-section">
          <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Shipping Information
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="firstName">First Name *</label>
              <input type="text" id="firstName" required placeholder="First name" autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Last Name *</label>
              <input type="text" id="lastName" required placeholder="Last name" autocomplete="family-name">
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email *</label>
              <input type="email" id="email" required placeholder="Email address" autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Phone *</label>
              <input type="tel" id="phone" required placeholder="+880 1XXX-XXXXXX" autocomplete="tel">
            </div>
            <div class="form-group col-span-2">
              <label class="form-label" for="address">Address *</label>
              <input type="text" id="address" required placeholder="House, Road, Area" autocomplete="street-address">
            </div>
            <div class="form-group">
              <label class="form-label" for="city">City *</label>
              <input type="text" id="city" required placeholder="City" autocomplete="address-level2">
            </div>
            <div class="form-group">
              <label class="form-label" for="district">District</label>
              <select id="district" autocomplete="address-level1">
                <option value="">Select District</option>
                <option>Dhaka</option><option>Chittagong</option><option>Sylhet</option><option>Rajshahi</option><option>Khulna</option><option>Barishal</option><option>Rangpur</option><option>Mymensingh</option>
              </select>
            </div>
            <div class="form-group col-span-2">
              <label class="form-label" for="notes">Order Notes (optional)</label>
              <textarea id="notes" rows="2" placeholder="Any special instructions…"></textarea>
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="checkout-section">
          <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Payment Method
          </h3>
          <label class="payment-option selected" id="payOpt-cod">
            <input type="radio" name="payment" value="cod" checked>
            <div>
              <div class="payment-label-head">Cash on Delivery (COD)</div>
              <div class="payment-label-sub">Pay when you receive your order</div>
            </div>
          </label>
          <label class="payment-option" id="payOpt-sslcommerz">
            <input type="radio" name="payment" value="sslcommerz">
            <div>
              <div class="payment-label-head">SSLCommerz <span class="coming-soon-badge">Coming Soon</span></div>
              <div class="payment-label-sub">bKash, Nagad, Rocket, Cards</div>
            </div>
          </label>
          <label class="payment-option" id="payOpt-stripe">
            <input type="radio" name="payment" value="stripe">
            <div>
              <div class="payment-label-head">Stripe <span class="coming-soon-badge">Coming Soon</span></div>
              <div class="payment-label-sub">International Credit/Debit Cards</div>
            </div>
          </label>
        </div>
      </div>

      <!-- Order Summary -->
      <aside class="order-summary-panel">
        <div class="glass-card">
          <h3>Order Summary</h3>
          <div id="checkoutItemsList" style="margin-bottom:1rem;max-height:240px;overflow-y:auto"></div>

          <div class="form-group" style="margin-bottom:0.75rem">
            <label class="form-label" for="couponInput">Coupon Code</label>
            <div class="coupon-form">
              <input type="text" id="couponInput" placeholder="Enter coupon code">
              <button class="btn-secondary btn-sm" id="applyCouponBtn">Apply</button>
            </div>
            <div id="couponMsg"></div>
          </div>

          <div class="summary-divider"></div>
          <div class="summary-row"><span>Subtotal</span><span id="subtotalDisplay">৳0</span></div>
          <div class="summary-row"><span>Delivery</span><span id="deliveryDisplay">৳80</span></div>
          <div class="summary-row" id="discountRow" style="display:none"><span>Discount</span><span id="discountDisplay" style="color:var(--success)">-৳0</span></div>
          <div class="summary-divider"></div>
          <div class="summary-row bold"><span>Total</span><span class="summary-total" id="totalDisplay">৳0</span></div>

          <button class="btn-primary" id="placeOrderBtn" style="width:100%;margin-top:1rem;padding:0.875rem;font-size:1rem">
            Place Order
          </button>
          <div class="secure-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Secure & Encrypted Checkout
          </div>
        </div>
      </aside>
    </div>
  </main>
  <footer id="footer"></footer>
  <div class="mobile-drawer" id="mobileDrawer" role="dialog" aria-modal="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel"></div>
  </div>
  <script type="module" src="./js/checkout.js"></script>
</body>
</html>
