<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Jomidar 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body class="auth-body">
  <div class="offline-banner" id="offlineBanner">⚠️ You are offline</div>
  <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="auth-wrapper">
    <a href="./index.html" class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      Jomidar 2.0
    </a>
    <div class="glass-card auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a reset link</p>
      </div>
      <form class="auth-form" id="forgotForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="name@example.com" autocomplete="email">
        </div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
      </form>
      <div class="auth-footer">Remembered? <a href="./login.html">Sign In</a></div>
    </div>
  </div>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
